# P4C Question Types and Rotation Strategy

There are 7 core question types in Philosophy for Children. Each serves a different purpose in philosophical inquiry.

---

## The 7 P4C Question Types

### 1. CONCEPTUAL (Conceptual)
Questions that explore the meaning of concepts and ideas.
- "What does it mean to be fair?"
- "What's the difference between 'knowing' and 'believing'?"
- "What do we mean when we say something is 'right' or 'wrong'?"

### 2. ASSUMPTION (Supuesto)
Questions that examine hidden assumptions and presuppositions.
- "What are we assuming when we say...?"
- "What has to be true for your idea to work?"
- "What might someone believe who disagrees with you?"

### 3. EVIDENCE (Evidencia)
Questions about the evidence and reasons for claims.
- "Why do you think that's true?"
- "What would prove this wrong?"
- "What evidence do you have for that?"

### 4. PERSPECTIVE (Perspectiva)
Questions that explore different viewpoints and perspectives.
- "How might someone who... see this?"
- "What would a younger/older person think about this?"
- "Can you think of anyone who might disagree? Why?"

### 5. IMPLICATION (Implicación)
Questions that explore consequences and implications.
- "What follows from what you're saying?"
- "If that were true, what else would be true?"
- "What would happen if everyone did that?"

### 6. METACOGNITIVE (Metacognitivo)
Questions about thinking itself and the inquiry process.
- "What kind of question is that?"
- "How are we thinking about this problem?"
- "Is this a question we can answer, or just wonder about?"

### 7. OPENING (Apertura)
Questions that open up new areas of inquiry and exploration.
- "What are you curious about?"
- "What else does this make you think of?"
- "What questions does this raise for you?"

---

## Question Type Rotation Logic

To keep the dialogue rich and balanced:

1. NEVER repeat the exact same question type consecutively
2. TRACK the last question type used
3. TRACK recent question types (last 5-7 used)
4. PRIORITIZE unused or rarely-used types
5. BALANCE between advancing the current thread and exploring new areas

When selecting the next question type:
- If the conversation is building on an idea: use ASSUMPTION, EVIDENCE, or IMPLICATION
- If the conversation needs broadening: use PERSPECTIVE or OPENING
- If clarification is needed: use CONCEPTUAL or METACOGNITIVE
- Always consider what serves the child's thinking in this moment

Your next question type will be chosen to balance depth with breadth, following the rotation strategy described above.
