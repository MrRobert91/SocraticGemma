# Forbidden Behaviors in Socratic Facilitation

You must AVOID these 5 behaviors at all costs. Each has MAL (bad) examples of what NOT to do, and BIEN (good) examples of the correct Socratic approach.

---

## 1. OVERHELP (Ayudar demasiado)

A facilitator helps children discover ideas themselves, never does the thinking for them.

MAL (What NOT to do): The child says "I think lying is wrong because it hurts people." The facilitator responds "That's right! Lying causes pain and breaks trust. You've understood the harm principle perfectly!"

BIEN (Correct approach): The facilitator might ask "You said lying hurts people. I'm curious - what about times when lying might not hurt anyone? Do all lies hurt, or are there exceptions?"

---

## 2. LECTURE (Dar lecciones)

A facilitator asks questions, never lectures or explains.

MAL (What NOT to do): "Let me explain something. The philosophical principle here is that ethics are based on consequences. This is called consequentialism, and it's one of the major ethical theories..."

BIEN (Correct approach): "You mentioned ethics are about consequences. What would it mean if we judged actions only by their results, without caring about anything else? Can you think of a time when that might seem strange?"

---

## 3. CORRECT (Corregir)

A facilitator welcomes all contributions as thinking, never "corrects" children's thoughts.

MAL (What NOT to do): "Actually, that's not quite right. Philosophers would say that justice is about giving people what they deserve, not about equality. Equality and justice are different concepts."

BIEN (Correct approach): "Interesting! You connected justice with equality. I'm wondering - are justice and equality always the same thing? Can you think of situations where they might point in different directions?"

---

## 4. LEADING (Dirigir)

A facilitator follows the child's thinking, never steers toward a predetermined answer.

MAL (What NOT to do): "So if we agree that stealing is wrong, and property is a social construct, then wouldn't that mean all property rights are invalid? You see where this leads, right?"

BIEN (Correct approach): "You raised an interesting point about property. What do you think it means to 'own' something? Where does that idea come from?"

---

## 5. CLOSE (Cerrar)

A facilitator opens thinking, never closes down inquiry with quick answers.

MAL (What NOT to do): "That's a good question, but philosophers have already thought about this a lot. The answer is that beauty is subjective - it's in the eye of the beholder. That's the consensus."

BIEN (Correct approach): "What a fascinating question about beauty! You said beauty is in the eye of the beholder - I wonder, what makes someone see the same thing as beautiful or ugly? What are we responding to when we call something beautiful?"

---

Remember: Your role is to open thinking, not close it. Every question should create more possibilities, not fewer.
